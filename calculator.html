<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --calculator-bg: #ffffff;
            --calculator-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            --display-bg: #1a1a1a;
            --display-color: #ffffff;
            --btn-bg: #f0f0f0;
            --btn-color: #333333;
            --btn-hover-bg: #e0e0e0;
            --btn-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            --btn-active-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            --operator-bg: #667eea;
            --operator-hover-bg: #5568d3;
            --equals-bg: #764ba2;
            --equals-hover-bg: #653a8a;
            --clear-bg: #ff6b6b;
            --clear-hover-bg: #ee5a5a;
            --accent-color: #ffffff;
            --theme-toggle-bg: rgba(255, 255, 255, 0.2);
            --theme-toggle-hover-bg: rgba(255, 255, 255, 0.35);
            --history-bg: rgba(255, 255, 255, 0.15);
            --history-border: rgba(255, 255, 255, 0.25);
            --history-title-color: #ffffff;
            --history-item-bg: rgba(255, 255, 255, 0.9);
            --history-item-color: #333333;
            --history-item-hover-bg: #ffffff;
            --history-empty-color: rgba(255, 255, 255, 0.7);
            --history-clear-bg: rgba(255, 255, 255, 0.2);
            --history-clear-hover-bg: rgba(255, 255, 255, 0.35);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --calculator-bg: #2d2d3a;
            --calculator-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            --display-bg: #0d0d12;
            --display-color: #e8e8e8;
            --btn-bg: #3d3d4d;
            --btn-color: #e8e8e8;
            --btn-hover-bg: #4d4d5d;
            --btn-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            --btn-active-shadow: 0 2px 5px rgba(0, 0, 0, 0.4);
            --operator-bg: #5a6fd6;
            --operator-hover-bg: #4a5fc6;
            --equals-bg: #8b5fbf;
            --equals-hover-bg: #7b4faf;
            --clear-bg: #e05555;
            --clear-hover-bg: #d04545;
            --accent-color: #ffffff;
            --theme-toggle-bg: rgba(255, 255, 255, 0.1);
            --theme-toggle-hover-bg: rgba(255, 255, 255, 0.2);
            --history-bg: rgba(0, 0, 0, 0.25);
            --history-border: rgba(255, 255, 255, 0.1);
            --history-title-color: #e8e8e8;
            --history-item-bg: rgba(45, 45, 58, 0.9);
            --history-item-color: #e8e8e8;
            --history-item-hover-bg: #3d3d4d;
            --history-empty-color: rgba(255, 255, 255, 0.45);
            --history-clear-bg: rgba(255, 255, 255, 0.1);
            --history-clear-hover-bg: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            padding: 20px;
            transition: background 0.3s ease;
        }

        .app {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            max-width: 720px;
            width: 100%;
        }

        .calculator {
            background: var(--calculator-bg);
            border-radius: 20px;
            box-shadow: var(--calculator-shadow);
            padding: 30px;
            max-width: 400px;
            width: 100%;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .calculator-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .theme-toggle {
            background: var(--theme-toggle-bg);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
            padding: 0;
            color: inherit;
        }

        .theme-toggle:hover {
            background: var(--theme-toggle-hover-bg);
            transform: scale(1.1);
            box-shadow: none;
        }

        .theme-toggle:active {
            transform: scale(0.95);
            box-shadow: none;
        }

        .display {
            background: var(--display-bg);
            color: var(--display-color);
            font-size: 2.5rem;
            padding: 20px;
            text-align: right;
            border-radius: 10px;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            overflow: hidden;
            white-space: nowrap;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            background: var(--btn-bg);
            border: none;
            border-radius: 10px;
            font-size: 1.5rem;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            color: var(--btn-color);
        }

        button:hover {
            background: var(--btn-hover-bg);
            transform: translateY(-2px);
            box-shadow: var(--btn-shadow);
        }

        button:active {
            transform: translateY(0);
            box-shadow: var(--btn-active-shadow);
        }

        .operator {
            background: var(--operator-bg);
            color: var(--accent-color);
        }

        .operator:hover {
            background: var(--operator-hover-bg);
        }

        .equals {
            background: var(--equals-bg);
            color: var(--accent-color);
        }

        .equals:hover {
            background: var(--equals-hover-bg);
        }

        .clear {
            background: var(--clear-bg);
            color: var(--accent-color);
        }

        .clear:hover {
            background: var(--clear-hover-bg);
        }

        .zero {
            grid-column: span 2;
        }

        .history-panel {
            background: var(--history-bg);
            border: 1px solid var(--history-border);
            border-radius: 20px;
            padding: 20px;
            flex: 1;
            min-width: 0;
            max-height: 560px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(8px);
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        .history-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--history-title-color);
        }

        .history-clear {
            background: var(--history-clear-bg);
            border: none;
            border-radius: 8px;
            color: var(--history-title-color);
            font-size: 0.8rem;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .history-clear:hover {
            background: var(--history-clear-hover-bg);
            transform: none;
            box-shadow: none;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 120px;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: var(--history-border);
            border-radius: 3px;
        }

        .history-empty {
            color: var(--history-empty-color);
            font-size: 0.9rem;
            text-align: center;
            padding: 20px 10px;
        }

        .history-item {
            background: var(--history-item-bg);
            color: var(--history-item-color);
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            text-align: left;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
            word-break: break-all;
            line-height: 1.4;
        }

        .history-item:hover {
            background: var(--history-item-hover-bg);
            transform: none;
            box-shadow: none;
        }

        .history-item .history-expression {
            opacity: 0.75;
            font-size: 0.85rem;
        }

        .history-item .history-result {
            font-weight: 700;
        }

        @media (max-width: 700px) {
            .app {
                flex-direction: column;
                align-items: stretch;
            }

            .history-panel {
                max-height: 220px;
            }
        }
    </style>
    <script>
        (function () {
            var saved = localStorage.getItem('calculator-theme');
            var theme = (saved === 'light' || saved === 'dark')
                ? saved
                : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <div class="app">
        <div class="calculator">
            <div class="calculator-header">
                <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему" title="Переключить тему">🌙</button>
            </div>
            <div class="display" id="display">0</div>
            <div class="buttons">
                <button class="clear" onclick="clearDisplay()">C</button>
                <button class="operator" onclick="appendOperator('/')">/</button>
                <button class="operator" onclick="appendOperator('*')">×</button>
                <button class="operator" onclick="deleteLast()">⌫</button>
                
                <button onclick="appendNumber('7')">7</button>
                <button onclick="appendNumber('8')">8</button>
                <button onclick="appendNumber('9')">9</button>
                <button class="operator" onclick="appendOperator('-')">-</button>
                
                <button onclick="appendNumber('4')">4</button>
                <button onclick="appendNumber('5')">5</button>
                <button onclick="appendNumber('6')">6</button>
                <button class="operator" onclick="appendOperator('+')">+</button>
                
                <button onclick="appendNumber('1')">1</button>
                <button onclick="appendNumber('2')">2</button>
                <button onclick="appendNumber('3')">3</button>
                <button class="equals" onclick="calculate()" rowspan="2">=</button>
                
                <button class="zero" onclick="appendNumber('0')">0</button>
                <button onclick="appendDecimal()">.</button>
            </div>
        </div>

        <aside class="history-panel">
            <div class="history-header">
                <span class="history-title">Журнал операций</span>
                <button class="history-clear" id="historyClear" type="button">Очистить</button>
            </div>
            <div class="history-list" id="historyList">
                <p class="history-empty" id="historyEmpty">Пока нет записей</p>
            </div>
        </aside>
    </div>

    <script>
        const THEME_KEY = 'calculator-theme';
        const themeToggle = document.getElementById('themeToggle');

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            themeToggle.setAttribute('aria-label', theme === 'dark' ? 'Включить светлую тему' : 'Включить тёмную тему');
            themeToggle.title = theme === 'dark' ? 'Светлая тема' : 'Тёмная тема';
        }

        function getPreferredTheme() {
            const saved = localStorage.getItem(THEME_KEY);
            if (saved === 'light' || saved === 'dark') {
                return saved;
            }
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const next = current === 'dark' ? 'light' : 'dark';
            applyTheme(next);
            localStorage.setItem(THEME_KEY, next);
        }

        applyTheme(getPreferredTheme());
        themeToggle.addEventListener('click', toggleTheme);

        const HISTORY_KEY = 'calculator-history';
        const MAX_HISTORY = 50;
        const historyList = document.getElementById('historyList');
        const historyEmpty = document.getElementById('historyEmpty');
        const historyClear = document.getElementById('historyClear');
        let history = [];

        function formatExpression(expression) {
            return expression.replace(/\*/g, '×');
        }

        function loadHistory() {
            try {
                const saved = localStorage.getItem(HISTORY_KEY);
                history = saved ? JSON.parse(saved) : [];
                if (!Array.isArray(history)) {
                    history = [];
                }
            } catch (error) {
                history = [];
            }
            renderHistory();
        }

        function saveHistory() {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        function addToHistory(expression, result) {
            history.unshift({ expression, result });
            if (history.length > MAX_HISTORY) {
                history = history.slice(0, MAX_HISTORY);
            }
            saveHistory();
            renderHistory();
        }

        function renderHistory() {
            historyList.querySelectorAll('.history-item').forEach(function (item) {
                item.remove();
            });

            if (history.length === 0) {
                historyEmpty.style.display = 'block';
                return;
            }

            historyEmpty.style.display = 'none';

            history.forEach(function (entry, index) {
                const item = document.createElement('button');
                item.type = 'button';
                item.className = 'history-item';
                item.innerHTML =
                    '<div class="history-expression">' + formatExpression(entry.expression) + ' =</div>' +
                    '<div class="history-result">' + entry.result + '</div>';
                item.addEventListener('click', function () {
                    useHistoryResult(index);
                });
                historyList.appendChild(item);
            });
        }

        function useHistoryResult(index) {
            const entry = history[index];
            if (!entry || entry.result === 'Ошибка') {
                return;
            }
            currentInput = entry.result;
            shouldResetDisplay = true;
            updateDisplay();
        }

        function clearHistory() {
            history = [];
            saveHistory();
            renderHistory();
        }

        historyClear.addEventListener('click', clearHistory);
        loadHistory();

        let display = document.getElementById('display');
        let currentInput = '0';
        let shouldResetDisplay = false;

        const MAX_NUMBER_LENGTH = 12;

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function isOperandAtLimit() {
            return getCurrentOperand(currentInput).length >= MAX_NUMBER_LENGTH;
        }

        function formatResult(value) {
            let str = String(value);
            if (str.length <= MAX_NUMBER_LENGTH) {
                return str;
            }
            const num = Number(value);
            if (!isFinite(num)) {
                return str.slice(0, MAX_NUMBER_LENGTH);
            }
            const exp = num.toExponential(MAX_NUMBER_LENGTH - 6);
            return exp.length <= MAX_NUMBER_LENGTH ? exp : num.toExponential(4);
        }

        function appendNumber(number) {
            if (shouldResetDisplay) {
                currentInput = '0';
                shouldResetDisplay = false;
            }

            if (currentInput === '0') {
                currentInput = number;
            } else {
                if (isOperandAtLimit()) {
                    return;
                }
                currentInput += number;
            }
            updateDisplay();
        }

        function getCurrentOperand(input) {
            const lastOpIndex = Math.max(
                input.lastIndexOf('+'),
                input.lastIndexOf('-'),
                input.lastIndexOf('*'),
                input.lastIndexOf('/')
            );

            if (lastOpIndex === -1) {
                return input;
            }

            if (lastOpIndex === 0 && input[0] === '-') {
                return input.slice(1);
            }

            return input.slice(lastOpIndex + 1);
        }

        function appendDecimal() {
            if (shouldResetDisplay) {
                currentInput = '0';
                shouldResetDisplay = false;
            }

            const operand = getCurrentOperand(currentInput);

            if (operand.includes('.')) {
                return;
            }

            if (operand === '') {
                currentInput += '0.';
            } else {
                if (isOperandAtLimit()) {
                    return;
                }
                currentInput += '.';
            }
            updateDisplay();
        }

        function appendOperator(operator) {
            if (shouldResetDisplay) {
                shouldResetDisplay = false;
            }
            
            const lastChar = currentInput[currentInput.length - 1];
            if (['+', '-', '*', '/'].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + operator;
            } else {
                currentInput += operator;
            }
            updateDisplay();
        }

        function calculate() {
            const originalExpression = currentInput;

            try {
                let expression = currentInput.replace(/×/g, '*');

                if (expression.includes('/0') && !expression.includes('/0.')) {
                    currentInput = 'Ошибка';
                    updateDisplay();
                    shouldResetDisplay = true;
                    addToHistory(originalExpression, 'Ошибка');
                    return;
                }

                const result = Function('"use strict"; return (' + expression + ')')();

                if (isNaN(result) || !isFinite(result)) {
                    currentInput = 'Ошибка';
                    addToHistory(originalExpression, 'Ошибка');
                } else {
                    currentInput = formatResult(result);
                    addToHistory(originalExpression, currentInput);
                }

                updateDisplay();
                shouldResetDisplay = true;
            } catch (error) {
                currentInput = 'Ошибка';
                updateDisplay();
                shouldResetDisplay = true;
                addToHistory(originalExpression, 'Ошибка');
            }
        }

        function clearDisplay() {
            currentInput = '0';
            shouldResetDisplay = false;
            updateDisplay();
        }

        function deleteLast() {
            if (shouldResetDisplay) {
                clearDisplay();
                return;
            }
            
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        // Поддержка клавиатуры
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            if (key >= '0' && key <= '9') {
                appendNumber(key);
            } else if (key === '.') {
                appendDecimal();
            } else if (key === '+') {
                appendOperator('+');
            } else if (key === '-') {
                appendOperator('-');
            } else if (key === '*') {
                appendOperator('*');
            } else if (key === '/') {
                event.preventDefault();
                appendOperator('/');
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearDisplay();
            } else if (key === 'Backspace') {
                deleteLast();
            }
        });
    </script>
</body>
</html>
